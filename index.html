<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIX AI - Asisten Digital Masa Kini</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <h1 class="title">⚡ FIX AI</h1>
            <p class="subtitle">"Asisten lo yang kece abis, tanpa sensor, tanpa batas"</p>
            
            <div class="chat-box" id="chatBox">
                <div class="message bot">
                    <span>🤖 FIX AI:</span> Wazzpiiii~ Gue FIX AI, siap bantu apapun! Ada yang bisa gue bantu hari ini?
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Tanya apa aja ke FIX AI..." autocomplete="off">
                <button id="sendBtn">🚀 Kirim</button>
            </div>
            
            <div class="status">
                <span class="dot"></span> FIX AI • Mode Bebas Aktif
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
